name: 行政書士記事の自動生成

on:
  schedule:
    - cron: '0 20 * * *'  # 毎日JST 05:00 (UTC 20:00)
  workflow_dispatch:       # 手動実行も可能

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: 記事生成APIを呼び出す
        run: |
          curl -f -X GET \
            "https://agri-gyosei.com/api/cron/generate-article" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --max-time 300

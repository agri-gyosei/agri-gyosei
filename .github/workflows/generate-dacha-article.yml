name: ダーチャ記事の自動生成

on:
  schedule:
    - cron: '30 20 * * *'  # 毎日JST 05:30 (UTC 20:30)
  workflow_dispatch:        # 手動実行も可能

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: JST日付を取得
        run: echo "JST_DATE=$(TZ=Asia/Tokyo date +%-m/%-d)" >> $GITHUB_ENV

      - name: 記事を生成してSupabaseに保存
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npx tsx scripts/run-generate-dacha-article.ts "${{ env.JST_DATE }}"
